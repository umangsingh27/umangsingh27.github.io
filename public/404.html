<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    var pathname = window.location.pathname;
    if (pathname !== '/') {
      sessionStorage.redirect = pathname;
    }
    window.location.href = '/';
  </script>
</head>
<body>
</body>
</html>
